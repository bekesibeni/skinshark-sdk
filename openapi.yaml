  # ─────────────────────────────────────────────────────────────────────
  # TRADING
  # ─────────────────────────────────────────────────────────────────────
  /market/buy:
    post:
      operationId: buyMarketItems
      tags: [Market]
      summary: Buy specific listings (1–10 at a time)
      description: |
        **Auth context:** sub-user — `On-Behalf-Of` required. **Rate limit: 100/min.**

        Each `items[]` entry references a `listingId` and a `maxPrice` ceiling.
        If the listing's price moved above `maxPrice` between catalog read and
        purchase, that item fails.

        Sub-user wallet is debited synchronously by `totalPrice` (escrowed); the
        Trade then runs through marketplace workers. Subscribe to `trade.*` WS
        events for status updates.

        Common error keys: `INSUFFICIENT_BALANCE` (1500), `LISTING_NOT_FOUND` (2011),
        `PRICE_MISMATCH` (2020), `TRADEURL_REQUIRED` (2022), `MARKET_UNAVAILABLE` (2000).
      parameters:
        - { $ref: '#/components/parameters/OnBehalfOf' }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/BuyBody' }
      responses:
        '201':
          description: Created.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/BuyResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationFailed' }
        '429': { $ref: '#/components/responses/RateLimited' }

  /market/buy/quick:
    post:
      operationId: quickBuyMarketItem
      tags: [Market]
      summary: Buy N units of an item — server picks the cheapest matching listings
      description: |
        **Auth context:** sub-user — `On-Behalf-Of` required. **Rate limit: 50/min.**

        Used for bulk fills. The server selects up to `amount` listings ≤
        `maxPrice` for the given `itemId` and creates one Trade. `itemCount` in
        the response is the actual purchased count (may be less than
        `requestedCount` if supply ran out at the cap).
      parameters:
        - { $ref: '#/components/parameters/OnBehalfOf' }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/QuickBuyBody' }
      responses:
        '201':
          description: Created.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/QuickBuyResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationFailed' }
        '429': { $ref: '#/components/responses/RateLimited' }

  /market/trades:
