      summary: Get item detail
      description: |
        **Auth context:** sub-user — `On-Behalf-Of` required. **Rate limit: 1000/min.**

        Includes per-marketplace `offersOverview` (best price + count) for the
        markets the item is currently listed on.
      parameters:
        - { $ref: '#/components/parameters/OnBehalfOf' }
