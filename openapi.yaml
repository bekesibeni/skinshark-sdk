  # LISTINGS
  # ─────────────────────────────────────────────────────────────────────
  /market/items/{itemId}/listings:
    get:
      operationId: listItemListings
      tags: [Market]
      summary: List live marketplace offers for an item
      description: |
        **Auth context:** sub-user — `On-Behalf-Of` required. **Rate limit: 200/min.**

        Live cross-marketplace offers for an item, dispatched to marketplace
        workers. `market` filters by marketplace index (0 = all). For Doppler
        knives, optionally filter by `phase`. For float-relevant items, pass
        `wearMin` + `wearMax` together (both required if either is sent).
      parameters:
        - { $ref: '#/components/parameters/OnBehalfOf' }
        - { name: itemId, in: path, required: true, schema: { type: string, minLength: 1 } }
        - { name: page, in: query, schema: { type: integer, minimum: 1, default: 1 } }
        - { name: limit, in: query, schema: { type: integer, minimum: 1, maximum: 100, default: 100 } }
        - { name: market, in: query, schema: { type: integer, minimum: 0, default: 0 } }
        - name: phase
          in: query
          schema:
            type: string
            enum: [Phase 1, Phase 2, Phase 3, Phase 4, Ruby, Sapphire, Black Pearl, Emerald]
        - { name: wearMin, in: query, schema: { type: number, minimum: 0, maximum: 1 } }
        - { name: wearMax, in: query, schema: { type: number, minimum: 0, maximum: 1 } }
