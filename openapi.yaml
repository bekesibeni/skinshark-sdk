      description: '**Auth context:** sub-user — `On-Behalf-Of` required. **Rate limit: 1000/min.**'
      parameters:
        - { $ref: '#/components/parameters/OnBehalfOf' }
        - { name: q, in: query, required: true, schema: { type: string, minLength: 1, maxLength: 100 } }
      responses:
        '200':
          description: OK.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/SuggestionsResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '429': { $ref: '#/components/responses/RateLimited' }

  /market/search:
    get:
      operationId: searchMarket
      tags: [Market]
      summary: Search items in the catalog
      description: |
        **Auth context:** sub-user — `On-Behalf-Of` required. **Rate limit: 1000/min.**

        Page-paginated. Returns canonical items (not listings) — to see live
        offers for an item, hit `/market/listings/:itemId`.
      parameters:
        - { $ref: '#/components/parameters/OnBehalfOf' }
        - { name: q, in: query, schema: { type: string, maxLength: 100 } }
        - { name: weapon, in: query, schema: { type: string, maxLength: 50 } }
        - { name: rarity, in: query, schema: { type: string, maxLength: 50 } }
        - { name: wear, in: query, schema: { type: string, maxLength: 50 } }
        - name: category
          in: query
          schema: { type: string, enum: [Normal, StatTrak, Souvenir] }
        - { name: itemType, in: query, schema: { type: string, maxLength: 50 } }
        - { name: tags, in: query, schema: { type: string, maxLength: 200 } }
        - { name: paintIndex, in: query, schema: { type: integer } }
        - { name: collection, in: query, schema: { type: string, maxLength: 200 } }
        - { name: priceMin, in: query, schema: { type: number, minimum: 0 } }
        - { name: priceMax, in: query, schema: { type: number, minimum: 0 } }
        - name: sort
          in: query
          schema: { type: string, enum: [relevance, nameAsc, nameDesc, priceAsc, priceDesc], default: relevance }
        - { name: page, in: query, schema: { type: integer, minimum: 1, default: 1 } }
        - { name: limit, in: query, schema: { type: integer, minimum: 1, maximum: 100, default: 50 } }
      responses:
        '200':
          description: OK.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
