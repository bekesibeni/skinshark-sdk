                    properties:
                      data: { $ref: '#/components/schemas/Trade' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /market/trades/{tradeId}/items/{itemId}/cancel:
    post:
      operationId: cancelMarketTransactionItem
      tags: [Market]
      summary: Cancel a single in-progress item on a Trade
      description: |
        **Auth context:** sub-user — `On-Behalf-Of` required. **Rate limit: 50/min.**

        Best-effort — marketplace must still accept the cancellation. The
        response `status` field reflects whether the cancel succeeded.
      parameters:
        - { $ref: '#/components/parameters/OnBehalfOf' }
        - { name: tradeId, in: path, required: true, schema: { type: string, minLength: 1, maxLength: 128 } }
        - { name: itemId, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200':
          description: OK.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/CancelItemResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '429': { $ref: '#/components/responses/RateLimited' }

  # ─────────────────────────────────────────────────────────────────────
  # WEBSOCKET
  # ─────────────────────────────────────────────────────────────────────
  /auth/ws-token:
    post:
      operationId: createWsToken
      tags: [WebSocket]
      summary: Mint a short-lived WS token for a sub-user
      description: |
        **Auth context:** sub-user — `On-Behalf-Of` required.

        Returns a 1-hour JWT scoped to `[deposit, trade]`. Pass it as the
        `?token=` query string when opening `wss://api.skinshark.gg/ws`.

        Tokens are bound to the sub-user resolved from `On-Behalf-Of` — the
        WebSocket only receives events for that user. To watch multiple
        sub-users, mint a token per sub-user and open one socket each.
      parameters:
        - { $ref: '#/components/parameters/OnBehalfOf' }
      responses:
        '200':
          description: OK.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/WsTokenResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /ws:
    get:
      operationId: wsConnect
      tags: [WebSocket]
      summary: WebSocket endpoint (HTTP upgrade)
      description: |
        **Auth context:** sub-user — token from `POST /auth/ws-token`.

        Open with `wss://api.skinshark.gg/ws?token=<wsToken>`. The token is
        verified at upgrade; on failure the server closes with code `4001
        Invalid token`.

        ### Protocol

        - **Read-only.** Any client → server frame closes the socket with code
          `4002 Read-only`.
        - **Heartbeat.** The server sends WS pings; respond with pongs to keep
          the connection alive (handled automatically by most clients).
        - **First frame.** Immediately after upgrade, the server sends
          `WsConnectedEvent` with the resolved `userId`.
        - **Subsequent frames.** All push events conform to `WsEvent` — a
          discriminated union keyed by the top-level `event` field.

        ### Close codes

        | Code | Reason          | Cause                                          |
        |------|-----------------|------------------------------------------------|
        | 4001 | Missing token   | No `?token=` query string                      |
        | 4001 | Invalid token   | Bad signature, expired, or wrong purpose       |
        | 4002 | Read-only       | Client sent any frame after upgrade            |

        ### Events

        Each frame has the shape `{ event, data, ts }` where `ts` is Unix epoch
        ms. See the `WsEvent` schema below for the full union — the deposit
        events differ between gateway-hosted (gatepay/onramp) and self-hosted
        crypto deposits even though they share `event` names.
      parameters:
        - name: token
          in: query
          required: true
          schema: { type: string, minLength: 1 }
      responses:
        '101':
          description: Switching Protocols — WebSocket handshake completed.
        '200':
          description: |
            Reference response for documentation tooling. The actual successful
            response is `101 Switching Protocols`; once upgraded, the server
            pushes JSON frames matching `WsEvent`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/WsEvent' }
        '400':
          description: Upgrade required / missing token (HTTP path).

  # Discriminated event union (referenced from /ws description above)
  /ws/events:
    get:
      operationId: wsEventsReference
      tags: [WebSocket]
      summary: '(Reference only) WebSocket event schemas'
      description: |
        This is a documentation-only path — there is no HTTP endpoint at
        `/ws/events`. Use it to navigate the message schemas pushed over
        `/ws`.

        Discriminate on `event`:

        - `connected` → WsConnectedEvent
        - `deposit.transfer` → WsDepositTransferEvent (gatepay on-chain detected)
        - `deposit.completed` → WsGatewayDepositCompletedEvent **or** WsCryptoDepositCreditedEvent (distinguish by `data.fundingId` vs `data.depositId`)
        - `deposit.failed` → WsDepositFailedEvent **or** WsCryptoDepositFailedEvent (distinguish by `data.fundingId` vs `data.depositId`)
        - `deposit.refunded` → WsDepositRefundedEvent
        - `deposit.pending` → WsCryptoDepositPendingEvent
        - `trade.<status>` → WsTradeUpdateEvent
        - `system.notice` → WsSystemNoticeEvent
      responses:
        '200':
          description: '(reference only)'
          content:
            application/json:
              schema: { $ref: '#/components/schemas/WsEvent' }
        '4XX':
          description: '(reference only — this path has no HTTP endpoint)'
