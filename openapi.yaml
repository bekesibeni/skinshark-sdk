                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/TransactionListResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /market/trades/{tradeId}:
    get:
      operationId: getMarketTransaction
      tags: [Market]
      summary: Get a single trade
      description: '**Auth context:** sub-user — `On-Behalf-Of` required.'
      parameters:
        - { $ref: '#/components/parameters/OnBehalfOf' }
        - { name: tradeId, in: path, required: true, schema: { type: string, minLength: 1, maxLength: 128 } }
      responses:
        '200':
          description: OK.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
