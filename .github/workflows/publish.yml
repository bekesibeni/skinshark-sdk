name: Publish to npm

# Triggers on a GitHub Release. Standard release flow:
#   1. npm version <patch|minor|major>   (creates a git tag)
#   2. git push --follow-tags
#   3. Create a Release on GitHub from that tag → workflow fires
#
# Uses OIDC + npm trusted publisher — no long-lived NPM_TOKEN needed.
# See: https://docs.npmjs.com/trusted-publishers

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write   # Required for npm provenance (OIDC).

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
          cache: pnpm

      - run: npm --version

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build

      # `--provenance` attaches a signed attestation linking the tarball
      # to this commit + workflow run. Auth via npm Trusted Publisher
      # (OIDC) — no NPM_TOKEN needed. Configured at:
      #   https://www.npmjs.com/package/@skinshark/sdk/access
      #     Organization:      bekesibeni
      #     Repository:        skinshark-sdk
      #     Workflow filename: publish.yml
      #     Environment:       (blank)
      - run: npm publish --access public --provenance
